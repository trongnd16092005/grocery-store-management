services:
  grocery-store:
    build: .
    ports:
      - "8081:8080"
    environment:
      DB_URL: ${DB_URL}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_POOL_MAX_SIZE: ${DB_POOL_MAX_SIZE:-6}
      DB_POOL_MIN_IDLE: ${DB_POOL_MIN_IDLE:-1}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8081/grocery-store}
      PAYOS_CLIENT_ID: ${PAYOS_CLIENT_ID:-}
      PAYOS_API_KEY: ${PAYOS_API_KEY:-}
      PAYOS_CHECKSUM_KEY: ${PAYOS_CHECKSUM_KEY:-}
      PAYOS_TEST_AMOUNT: ${PAYOS_TEST_AMOUNT:-5000}
