<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Hóa Đơn - Cửa Hàng Bán Lẻ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<div class="container-fluid p-0 d-flex">
    <div id="sidebar-placeholder"></div>

    <div class="main-content">
        <div class="topbar">
            <h1 class="h4 m-0 fw-bold">🧾 Quản Lý Hóa Đơn</h1>
        </div>

        <div class="content">
            <!-- Search & Filter -->
            <div class="card mb-4 shadow-sm border-0">
                <div class="card-body py-3">
                    <div class="row g-3">
                        <div class="col-md-5">
                            <div class="input-group">
                                <span class="input-group-text bg-white border-end-0 text-muted">
                                    <i class="fa-solid fa-magnifying-glass"></i>
                                </span>
                                <input type="text" id="searchInput" class="form-control border-start-0 ps-0"
                                    placeholder="Tìm theo mã hóa đơn, thu ngân..." onkeyup="filterTable()">
                            </div>
                        </div>
                        <div class="col-md-3">
                            <select class="form-select" id="statusFilter" onchange="filterTable()">
                                <option value="">Tất cả trạng thái</option>
                                <option>Đã thanh toán</option>
                                <option>Chưa thanh toán</option>
                                <option>Đã hủy</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <input type="date" class="form-control" id="dateFilter" onchange="filterTable()">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Invoice Table -->
            <div class="card shadow-sm border-0">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th class="ps-4 py-3">Mã HĐ</th>
                                    <th class="py-3">Ngày & Giờ</th>
                                    <th class="py-3">Thu ngân</th>
                                    <th class="py-3">Số mặt hàng</th>
                                    <th class="py-3">Tổng tiền</th>
                                    <th class="py-3">Trạng thái</th>
                                    <th class="text-end pe-4 py-3">Hành động</th>
                                </tr>
                            </thead>
                            <tbody id="tableBody">
                                <!-- Rows populated by JS from INVOICES data -->
                            </tbody>
                        </table>
                    </div>
                </div>
                <!-- Pagination -->
                <div class="card-footer bg-white d-flex justify-content-between align-items-center py-3 border-0">
                    <span class="text-muted small" id="tableInfo">Đang tải...</span>
                    <nav>
                        <ul class="pagination pagination-sm mb-0" id="pagination"></ul>
                    </nav>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- ===== MODAL: Chi tiết hóa đơn ===== -->
<div class="modal fade" id="detailModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content border-0 shadow">
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title fw-bold">
                    Chi tiết hóa đơn &nbsp;
                    <span id="detailId" class="text-primary"></span>
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <!-- Invoice meta -->
                <div class="row g-2 mb-3 p-3 rounded-2 bg-light">
                    <div class="col-sm-4">
                        <span class="text-muted small">Ngày & giờ</span>
                        <div class="fw-semibold" id="detailDate"></div>
                    </div>
                    <div class="col-sm-4">
                        <span class="text-muted small">Thu ngân</span>
                        <div class="fw-semibold" id="detailCashier"></div>
                    </div>
                    <div class="col-sm-4">
                        <span class="text-muted small">Trạng thái</span>
                        <div id="detailStatus"></div>
                    </div>
                </div>

                <!-- Items table -->
                <table class="table table-bordered align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>Tên sản phẩm</th>
                            <th class="text-end" style="width:110px;">Đơn giá</th>
                            <th class="text-center" style="width:70px;">SL</th>
                            <th class="text-end" style="width:120px;">Thành tiền</th>
                        </tr>
                    </thead>
                    <tbody id="detailItems"></tbody>
                    <tfoot>
                        <tr class="table-light">
                            <td colspan="3" class="text-end fw-bold">Tổng thanh toán:</td>
                            <td class="text-end fw-bold text-danger fs-5" id="detailTotal"></td>
                        </tr>
                    </tfoot>
                </table>
            </div>
            <div class="modal-footer border-0 pt-0">
                <button class="btn btn-secondary" data-bs-dismiss="modal">
                    <i class="fa-solid fa-xmark me-1"></i>Đóng
                </button>
                <button class="btn btn-danger" id="cancelInvoiceBtn" onclick="cancelInvoice()">
                    <i class="fa-solid fa-ban me-1"></i>Hủy hóa đơn
                </button>
                <button class="btn btn-primary" onclick="alert('Đang kết nối máy in...')">
                    <i class="fa-solid fa-print me-1"></i>In lại hóa đơn
                </button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
// ---- Load Sidebar ----
fetch('common/sidebar.html')
    .then(r => r.text())
    .then(html => {
        document.getElementById('sidebar-placeholder').outerHTML = html;
        const link = document.querySelector('.sidebar-nav a[href="invoices.html"]');
        if (link) link.classList.add('active');
    });

// ============================================================
//  MOCK DATA
// ============================================================
const INVOICES = [
    {
        id:'HD001', date:'18/06/2026 10:15', rawDate:'2026-06-18',
        cashier:'Admin', status:'Đã thanh toán', total:55000,
        items:[
            { name:'Coca Cola 320ml', price:10000, qty:2 },
            { name:'Bánh Quy Cosy 200g', price:35000, qty:1 },
        ]
    },
    {
        id:'HD002', date:'18/06/2026 11:30', rawDate:'2026-06-18',
        cashier:'Admin', status:'Đã thanh toán', total:68000,
        items:[
            { name:'Aquafina 500ml', price:6000, qty:4 },
            { name:'Kẹo dẻo Haribo 80g', price:22000, qty:2 },
        ]
    },
    {
        id:'HD003', date:'17/06/2026 14:20', rawDate:'2026-06-17',
        cashier:'Thu ngân A', status:'Đã hủy', total:45000,
        items:[
            { name:'Mì Hảo Hảo Tôm Chua Cay', price:4500, qty:10 },
        ]
    },
    {
        id:'HD004', date:'17/06/2026 16:45', rawDate:'2026-06-17',
        cashier:'Thu ngân A', status:'Chưa thanh toán', total:128000,
        items:[
            { name:'Hạt nêm Knorr 400g', price:38000, qty:1 },
            { name:'Nước mắm Chinsu 500ml', price:45000, qty:2 },
        ]
    },
    {
        id:'HD005', date:'16/06/2026 09:10', rawDate:'2026-06-16',
        cashier:'Admin', status:'Đã thanh toán', total:50000,
        items:[
            { name:'Coca Cola 320ml', price:10000, qty:5 },
        ]
    },
    {
        id:'HD006', date:'16/06/2026 14:00', rawDate:'2026-06-16',
        cashier:'Thu ngân B', status:'Đã thanh toán', total:83000,
        items:[
            { name:'Pepsi Lon 330ml', price:9500, qty:3 },
            { name:'Bánh Quy Cosy 200g', price:35000, qty:1 },
            { name:'Kẹo dẻo Haribo 80g', price:19500, qty:1 },
        ]
    },
];

// ============================================================
//  PAGINATION STATE
// ============================================================
const PAGE_SIZE = 5;
let currentPage = 1;
let filteredData = [...INVOICES];
let currentInvoiceId = null;

// ============================================================
//  RENDER TABLE
// ============================================================
function statusBadge(s) {
    if (s === 'Đã thanh toán') return '<span class="badge bg-success">Đã thanh toán</span>';
    if (s === 'Đã hủy')        return '<span class="badge bg-danger">Đã hủy</span>';
    return '<span class="badge bg-warning text-dark">Chưa thanh toán</span>';
}

function fmt(n) { return new Intl.NumberFormat('vi-VN').format(n) + ' đ'; }

function renderTable() {
    const start = (currentPage - 1) * PAGE_SIZE;
    const pageData = filteredData.slice(start, start + PAGE_SIZE);
    const tbody = document.getElementById('tableBody');

    tbody.innerHTML = pageData.map(inv => `
        <tr data-id="${inv.id}" data-date="${inv.rawDate}" data-cashier="${inv.cashier.toLowerCase()}"
            data-status="${inv.status}" data-total="${inv.total}">
            <td class="ps-4"><span class="fw-semibold">${inv.id}</span></td>
            <td class="text-muted small">${inv.date}</td>
            <td>${inv.cashier}</td>
            <td><span class="badge rounded-pill bg-secondary bg-opacity-10 text-secondary">${inv.items.length} mặt hàng</span></td>
            <td class="fw-bold text-danger">${fmt(inv.total)}</td>
            <td>${statusBadge(inv.status)}</td>
            <td class="text-end pe-4">
                <button class="btn btn-sm btn-outline-primary" onclick="showDetail('${inv.id}')">
                    <i class="fa-solid fa-eye me-1"></i>Chi tiết
                </button>
            </td>
        </tr>`).join('');

    document.getElementById('tableInfo').textContent =
        `Hiển thị ${start + 1}–${Math.min(start + PAGE_SIZE, filteredData.length)} / ${filteredData.length} hóa đơn`;

    renderPagination();
}

// ============================================================
//  PAGINATION
// ============================================================
function renderPagination() {
    const totalPages = Math.max(1, Math.ceil(filteredData.length / PAGE_SIZE));
    const ul = document.getElementById('pagination');
    let html = `
        <li class="page-item ${currentPage === 1 ? 'disabled' : ''}">
            <a class="page-link" href="#" onclick="goPage(${currentPage - 1})">
                <i class="fa-solid fa-chevron-left"></i>
            </a>
        </li>`;
    for (let i = 1; i <= totalPages; i++) {
        html += `<li class="page-item ${i === currentPage ? 'active' : ''}">
            <a class="page-link" href="#" onclick="goPage(${i})">${i}</a>
        </li>`;
    }
    html += `
        <li class="page-item ${currentPage === totalPages ? 'disabled' : ''}">
            <a class="page-link" href="#" onclick="goPage(${currentPage + 1})">
                <i class="fa-solid fa-chevron-right"></i>
            </a>
        </li>`;
    ul.innerHTML = html;
}

function goPage(p) {
    const totalPages = Math.ceil(filteredData.length / PAGE_SIZE);
    if (p < 1 || p > totalPages) return;
    currentPage = p;
    renderTable();
    return false;
}

// ============================================================
//  FILTER / SEARCH
// ============================================================
function filterTable() {
    const q      = document.getElementById('searchInput').value.toLowerCase();
    const status = document.getElementById('statusFilter').value;
    const date   = document.getElementById('dateFilter').value;

    filteredData = INVOICES.filter(inv =>
        (inv.id.toLowerCase().includes(q) || inv.cashier.toLowerCase().includes(q))
        && (!status || inv.status === status)
        && (!date   || inv.rawDate === date)
    );
    currentPage = 1;
    renderTable();
}

// ============================================================
//  SHOW DETAIL MODAL
// ============================================================
function showDetail(id) {
    const inv = INVOICES.find(x => x.id === id);
    if (!inv) return;
    currentInvoiceId = id;

    document.getElementById('detailId').textContent = id;
    document.getElementById('detailDate').textContent = inv.date;
    document.getElementById('detailCashier').textContent = inv.cashier;
    document.getElementById('detailStatus').innerHTML = statusBadge(inv.status);
    document.getElementById('detailTotal').textContent = fmt(inv.total);

    // Show / hide Cancel button depending on status
    const cancelBtn = document.getElementById('cancelInvoiceBtn');
    cancelBtn.classList.toggle('d-none', inv.status === 'Đã hủy');

    document.getElementById('detailItems').innerHTML = inv.items.map(item => `
        <tr>
            <td>${item.name}</td>
            <td class="text-end">${fmt(item.price)}</td>
            <td class="text-center">${item.qty}</td>
            <td class="text-end fw-semibold">${fmt(item.price * item.qty)}</td>
        </tr>`).join('');

    bootstrap.Modal.getOrCreateInstance(document.getElementById('detailModal')).show();
}

// ============================================================
//  CANCEL INVOICE
// ============================================================
function cancelInvoice() {
    if (!confirm(`Hủy hóa đơn ${currentInvoiceId}? Thao tác này không thể hoàn tác.`)) return;
    const inv = INVOICES.find(x => x.id === currentInvoiceId);
    if (inv) {
        inv.status = 'Đã hủy';
        // Update row in filteredData too
        filterTable();
    }
    bootstrap.Modal.getInstance(document.getElementById('detailModal')).hide();
}

// ============================================================
//  INIT
// ============================================================
renderTable();
</script>
</body>
</html>
